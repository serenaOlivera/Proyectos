<!DOCTYPE html>
<html>
    <head>
        <title>ENLACES</title>
    </head>
    <body>
        <h1>Una web con enlaces</h1>
        <!-- etiqueta a por "anchor"/ancla-->
         <!-- href vuelve funcional a la etiqueta, para que redirija-->
        <a href="enlaces_2.html"> Proyectos</a>
        <!-- para que se nos abra en otra pestaña, el atributo target nos sirve-->
	<!--hola!!!-->
	<h2>enlace con target _blank</h2>
        <a href="enlaces_3.html" target="_blank" title="nos lleva a otra pagina"> Otra Pagina</a>
        <p> EL atributo title nos pide información del elemento, ejemplo: si vemos el enlace 3 (Otra pagina) de vuelta, nos abre el cuadradito de la información</p>
    </body>
</html>
